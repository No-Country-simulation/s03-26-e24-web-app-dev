spring:
  application:
    name: CmsProBackend
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/cmspro_database}
    username: ${POSTGRES_USER:cmspro_user}
    password: ${POSTGRES_PASSWORD:cmspro_password}
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: 5000
  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true